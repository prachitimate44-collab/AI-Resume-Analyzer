<!DOCTYPE html>
<html>
<head>
<title>AI Resume Analyzer Result</title>

<style>
body{
    font-family: Arial;
    text-align:center;
    margin-top:40px;
}

.card{
    border:1px solid #ccc;
    padding:20px;
    margin:20px auto;
    width:400px;
    border-radius:10px;
}

</style>

</head>

<body>

<h1>Resume Analysis Result</h1>

<div class="card">
<h2>Resume Score: {{score}}%</h2>

<h2>Job Match Score: {{job_match}}%</h2>
</div>


<div class="card">
<h3>Skills Found</h3>

{% for skill in skills %}
<p>{{skill}}</p>
{% endfor %}

</div>


<div class="card">
<h3>Missing Skills</h3>

{% for item in missing %}
<p>{{item}}</p>
{% endfor %}

</div>


<div class="card">
<h3>Suggestions</h3>

{% for s in suggestions %}
<p>{{s}}</p>
{% endfor %}

</div>


</body>
</html>
